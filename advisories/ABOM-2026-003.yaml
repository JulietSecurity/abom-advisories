summary: Checkmarx supply chain compromise (TeamPCP, March-April 2026)
details: >-
  A two-wave supply chain compromise of Checkmarx artifacts attributed to the
  TeamPCP threat actor. On 2026-03-23 between 12:58 and 16:50 UTC, all 35 tags
  of Checkmarx/kics-github-action and at least tag 2.3.28 of
  Checkmarx/ast-github-action were force-pushed to malicious setup.sh payloads
  via the compromised cx-plugins-releases service account. On 2026-04-22,
  Checkmarx/ast-github-action tag 2.3.35 was re-compromised between 14:17 and
  15:41 UTC, and checkmarx/kics Docker images were trojanized between 12:31
  and 12:59 UTC. The injected payloads were infostealers that harvested CI
  secrets, SSH keys, cloud credentials (including Kubernetes service account
  tokens), and GitHub tokens; the March wave additionally deployed a
  systemd-persistent Python backdoor and attempted Kubernetes privileged pod
  deployment. Credentials harvested during this campaign were subsequently
  used on 2026-04-22 to publish a malicious @bitwarden/cli 2026.4.0 npm
  package (outside ABOM scope). Same actor and tradecraft as the Trivy
  compromise five days before the first wave (ABOM-2026-001).
