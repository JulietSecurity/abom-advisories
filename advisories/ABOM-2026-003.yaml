database_specific:
  abom:
    indicators:
      docker_images:
        - checkmarx/kics:v2.1.20
        - checkmarx/kics:v2.1.20-debian
        - checkmarx/kics:v2.1.21
        - checkmarx/kics:v2.1.21-debian
        - checkmarx/kics:alpine
        - checkmarx/kics:debian
        - checkmarx/kics:latest
      repos_to_check:
        - docs-tpcp
      notes: >-
        March wave C2: checkmarx[.]zone (83.142.209.11). Fallback exfiltration
        creates a public repo named docs-tpcp under the victim's GitHub
        account and uploads the stolen tarball as a release asset (the Trivy
        campaign used tpcp-docs; covered in ABOM-2026-001). Initial publish
        identity was the cx-plugins-releases service account (GitHub user ID
        225848595); audit org audit logs for unexpected pushes from this
        account. Host persistence paths: ~/.config/sysmon/sysmon.py,
        /root/.config/sysmon/sysmon.py, and
        /root/.config/systemd/user/sysmon.service. A backdoor Python script
        polls https://checkmarx[.]zone/raw for follow-on payloads. April wave
        C2: checkmarx[.]cx (91.195.240.123) and audit.checkmarx[.]cx
        (94.154.172.43). The April wave Docker image tags listed above were
        re-pushed clean by Checkmarx (v2.1.21 was deleted entirely); they
        remain IOCs for any image pulled during the 12:31-12:59 UTC window on
        2026-04-22.
    recommended_actions:
      - Pin to commit SHA or update to safe tag (kics-github-action v2.1.20, ast-github-action v2.3.36)
      - Re-pin any SHA references to commits reachable from current upstream refs; SHAs from the force-pushed tags remain in git history and continue to execute the malicious payload
      - Rotate all secrets accessible to affected CI pipelines, including GitHub tokens, cloud credentials, SSH keys, and Kubernetes service account tokens
      - Check for unauthorized repos named docs-tpcp in your GitHub org
      - Audit Kubernetes clusters for unexpected privileged pods and for systemd units at /root/.config/systemd/user/sysmon.service
      - Re-pull checkmarx/kics Docker images using a digest pinned outside the 2026-04-22 12:31-12:59 UTC window, or move to SHA-pinned references
